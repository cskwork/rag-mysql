# Streamlit secrets configuration
# Copy this file to .streamlit/secrets.toml and update with your actual values
# DO NOT commit this file to version control

[database]
host = "localhost"
port = 3306
user = "root"
password = "root"
name = "hotel_db"

[ollama]
model = "llama3.2:3b-instruct-q8_0"

[vanna]
disable_telemetry = true
allow_llm_to_see_data = true

# Optional: If you have a Vanna.ai account (leave empty for local ChromaDB)
